siglum: Mt 13, 44-52
text: |-
  Jezus opowiedział tłumom taką przypowieść:

  «Królestwo niebieskie podobne jest do skarbu ukrytego w roli. Znalazł go pewien człowiek i ukrył ponownie. Uradowany poszedł, sprzedał wszystko, co miał, i kupił tę rolę. Dalej, podobne jest królestwo niebieskie do kupca poszukującego pięknych pereł. Gdy znalazł jedną drogocenną perłę, poszedł, sprzedał wszystko, co miał, i kupił ją».

  «Dalej, podobne jest królestwo niebieskie do sieci, zarzuconej w morze i zagarniającej ryby wszelkiego rodzaju. Gdy się napełniła, wyciągnęli ją na brzeg i usiadłszy, dobre zebrali w naczynia, a złe odrzucili. Tak będzie przy końcu świata: wyjdą aniołowie, wyłączą złych spośród sprawiedliwych i wrzucą ich w piec rozpalony; tam będzie płacz i zgrzytanie zębów. Zrozumieliście to wszystko?»

  Odpowiedzieli Mu: «Tak».

  A On rzekł do nich: «Dlatego każdy uczony w Piśmie, który stał się uczniem królestwa niebieskiego, podobny jest do ojca rodziny, który ze swego skarbca wydobywa rzeczy nowe i stare».
variants:
  ogolne:
    title: Przypowieść o skarbie i perle
    questions:
    - Co jest Twoim największym celem życiowym?
    - Znalezienie skarbu nie jest jakimś tam byle zadankiem. Czy sądzisz, że wymagasz wystarczająco dużo na drodze do jego znalezienia?
    - 'Co jest Ci bliższe: „albo grubo, albo wcale”, czy „no chyba ujdzie”?'

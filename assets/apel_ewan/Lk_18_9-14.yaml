siglum: Łk 18, 9-14
folders:
- dekalog
text: |-
  Jezus opowiedział niektórym, co dufni byli w siebie, że są sprawiedliwi, a innymi gardzili, tę przypowieść:

  «Dwóch ludzi przyszło do świątyni, żeby się modlić, jeden faryzeusz, a drugi celnik. Faryzeusz stanął i tak w duszy się modlił: „Boże, dziękuję Ci, że nie jestem jak inni ludzie: zdziercy, niesprawiedliwi, cudzołożnicy, albo jak i ten celnik. Zachowuję post dwa razy w tygodniu, daję dziesięcinę ze wszystkiego, co nabywam”.

  A celnik stał z daleka i nie śmiał nawet oczu wznieść ku niebu, lecz bił się w piersi, mówiąc: „Boże, miej litość dla mnie, grzesznika!”

  Powiadam wam: Ten odszedł do domu usprawiedliwiony, nie tamten. Każdy bowiem, kto się wywyższa, będzie poniżony, a kto się uniża, będzie wywyższony».
variants:
  ogolne:
    title: Faryzeusze i celnicy
    questions:
    - Co dokładnie jest według Jezusa nie tak z modlitwą faryzeusza?
    - Po co Jezus opowiedział tę historię akurat tym zadufanym?
    - Co konkretnie znaczą słowa "kto się wywyższa, będzie poniżony, a kto się uniża, będzie wywyższony"? Czy masz od teraz chodzić po sąsiadach i mówić, że jesteś do kitu?
    - Jak dobrze się modlić?
  dekalog:
    title: Nie będziesz miał bogów cudzych przede mną
    shortTitle: |-
      I
      Przykazanie
    questions:
    - 'Na czym polegała modlitwa każdego z mężczyzn? '
    - Co nie pozwoliło faryzeuszowi skupić się na modlitwie?
    - Czym różni się postawa celnika i faryzeusza?
    - Faryzeusz był tak skupiony na sobie i opinii na własny temat, że stało się to dla niego bożkiem przesłaniającym Prawdziwego Boga. Co jeszcze może pełnić rolę takiego bożka w życiu człowieka?
    - Co w Waszym życiu może być bożkiem?
    comment: Zastanów się w wolnej chwili, jak pozbyć się Twojego bożka.

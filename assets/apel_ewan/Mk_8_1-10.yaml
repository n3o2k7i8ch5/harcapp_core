siglum: Mk 8, 1-10
text: |-
  W owym czasie, gdy znowu wielki tłum był z Jezusem i nie mieli co jeść, przywołał do siebie uczniów i rzekł im: «Żal Mi tego tłumu, bo już trzy dni trwają przy Mnie, a nie mają co jeść. I jeśli ich puszczę zgłodniałych do domu, zasłabną w drodze, bo niektórzy z nich przyszli z daleka».

  Odpowiedzieli uczniowie: «Jakże tu na pustkowiu będzie mógł ktoś nakarmić ich chlebem?» Zapytał ich: «Ile macie chlebów?» Odpowiedzieli: «Siedem». I polecił tłumowi usiąść na ziemi. A wziąwszy siedem chlebów, odmówił dziękczynienie, połamał i dawał uczniom, aby je podawali. I podali tłumowi.

  Mieli też kilka rybek. I nad tymi odmówił błogosławieństwo, i polecił je rozdać. Jedli do syta, a pozostałych ułomków zebrali siedem koszów. Było zaś około czterech tysięcy ludzi. Potem ich odprawił. Zaraz też wsiadł z uczniami do łodzi i przybył w okolice Dalmanuty.
variants:
  ogolne:
    title: Drugie rozmnożenie chleba
    questions:
    - Jak myślisz, dlaczego niektórzy chcieli słuchać Jezusa, syna jakiegoś żydowskiego stolarza, trzeci dzień bez jedzenia?
    - Jezus i apostołowie musieli być niezwykle popularni po rozmnożeniu chelba. Dlaczego zwyczajnie odpłynęli do Dalmanuty?
    - Czy zdarza Ci się nie zrobić czegoś bardzo ważnego z obawy, że zabraknie Ci rzeczy przyziemnych?

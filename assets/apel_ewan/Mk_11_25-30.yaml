siglum: Mk 11, 25-30
text: |-
  W owym czasie Jezus przemówił tymi słowami:

  «Wysławiam Cię, Ojcze, Panie nieba i ziemi, że zakryłeś te rzeczy przed mądrymi i roztropnymi, a objawiłeś je prostaczkom. Tak, Ojcze, gdyż takie było Twoje upodobanie.

  Wszystko przekazał Mi Ojciec mój. Nikt też nie zna Syna, tylko Ojciec, ani Ojca nikt nie zna, tylko Syn i ten, komu Syn zechce objawić.

  Przyjdźcie do Mnie wszyscy, którzy utrudzeni i obciążeni jesteście, a Ja was pokrzepię. Weźcie na siebie moje jarzmo i uczcie się ode Mnie, bo jestem cichy i pokornego serca, a znajdziecie ukojenie dla dusz waszych. Albowiem słodkie jest moje jarzmo, a moje brzemię lekkie».
variants:
  ogolne:
    title: Wiara i modlitwa
    questions:
    - Jak sądzisz, jak wyglądała relacja Jezusa z Ojcem? Przecież obaj są tym samym Bogiem!
    - Jakie miejsce w ciągu Twojego dnia zajmuje kontakt z Bogiem? Czy modlitwa musi być w formie słów?
    - Jaki rodzaj zmęczenia najczęściej towarzyszy Twojemu życiu?
    - Czy Twoje zmęczenie wynika z trudu próby życia w przyjaźni z Bogiem, czy z nudy i pustki życiowej?
    - Jak rozumieć słowa "słodkie jest moje jarzmo, a moje brzemię lekkie"?
    comment: |-
      Kilka wyjaśnień! :)

      Jarzmo to urządzenie przytrzymujące, wzmacniające coś lub spinające jakieś części. Często odnosi się do uprzęży muła roboczego.

      Brzemię zaś, to ciężar - coś, co jest trudne do zniesienia.

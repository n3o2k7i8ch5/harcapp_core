siglum: Łk 16, 9-15
text: |-
  Jezus powiedział do swoich uczniów: «Pozyskujcie sobie przyjaciół niegodziwą mamoną, aby gdy wszystko się skończy, przyjęto was do wiecznych przybytków. Kto w bardzo małej sprawie jest wierny, ten i w wielkiej będzie wierny; a kto w bardzo małej sprawie jest nieuczciwy, ten i w wielkiej nieuczciwy będzie. Jeśli więc w zarządzaniu niegodziwą mamoną nie okazaliście się wierni, to kto wam prawdziwe dobro powierzy?

  Jeśli w zarządzaniu cudzym dobrem nie okazaliście się wierni, to któż wam da wasze? Żaden sługa nie może dwóm panom służyć. Gdyż albo jednego będzie nienawidził, a drugiego miłował; albo z tamtym będzie trzymał, a tym wzgardzi. Nie możecie służyć Bogu i Mamonie!»

  Słuchali tego wszystkiego chciwi na grosz faryzeusze i podrwiwali sobie z Niego. Powiedział więc do nich: «To wy właśnie wobec ludzi udajecie sprawiedliwych, ale Bóg zna wasze serca. To bowiem, co za wielkie uchodzi między ludźmi, obrzydliwością jest w oczach Bożych».
variants:
  ogolne:
    title: Dobry użytek z pieniądza
    questions:
    - Czy "niegodziwa mamona" to tylko pieniądze?
    - Czy dobrze wykorzystujesz swój czas? Czy jest coś, co mógłbyś robić lepiej?
    - Co to znaczy, że "żaden sługa nie może dwóm panom służyć"?
    - Komu lub czemu chciałbyś służyć z całego serca? Komu lub czemu służysz obecnie?
    - Jak myślisz, dlaczego faryzeusze podriwawli sobie z Jezusa?

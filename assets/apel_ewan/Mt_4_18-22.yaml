siglum: Mt 4, 18-22
text: |-
  Gdy Jezus przechodził obok Jeziora Galilejskiego, ujrzał dwóch braci, Szymona, zwanego Piotrem, i brata jego Andrzeja, jak zarzucali sieć w jezioro; byli bowiem rybakami. I rzekł do nich: «Pójdźcie za Mną, a uczynię was rybakami ludzi». Oni natychmiast zostawili sieci i poszli za Nim. A gdy poszedł stamtąd dalej, ujrzał innych dwóch braci, Jakuba, syna Zebedeusza, i brata jego Jana, jak z ojcem swym Zebedeuszem naprawiali w łodzi swe sieci. Ich też powołał. A oni natychmiast zostawili łódź i ojca i poszli za Nim.
variants:
  ogolne:
    title: Powołanie pierwszych uczniów
    questions:
    - Piotr i Andrzej byli dorosłymi, pracującymi facetami. Jak to możliwe, że poznawszy Jezusa rzucili wszystko i zdecydowali się z nim pójść?
    - Czy ludzi łowi się tak samo jak ryby? Jeśli nie, czym się to różni? Jak się łowi harcerzy?
    - Jak dziś Bóg powołuje ludzi?
    - Czy znasz Boga na tyle, by móc zmienić swoje plany, gdy Cię wezwie?
    - Czy byłbyś gotowy przyjąć wolę bożą, niezależnie jak trudna by nie była?

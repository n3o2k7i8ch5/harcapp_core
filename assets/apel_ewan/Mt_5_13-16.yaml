siglum: Mt 5, 13-16
text: |-
  Jezus powiedział do swoich uczniów:

  «Wy jesteście solą ziemi. Lecz jeśli sól utraci swój smak, czymże ją posolić? Na nic się już nie przyda, chyba na wyrzucenie i podeptanie przez ludzi. Wy jesteście światłem świata. Nie może się ukryć miasto położone na górze. Nie zapala się też lampy i nie umieszcza pod korcem, ale na świeczniku, aby świeciła wszystkim, którzy są w domu. Tak niech wasze światło jaśnieje przed ludźmi, aby widzieli wasze dobre uczynki i chwalili Ojca waszego, który jest w niebie».
variants:
  ogolne:
    title: Jesteście solą ziemi
    questions:
    - Jezus wędrował po świecie z zaledwie dwunastoma apostołami, z czego jeden go zdradził. Co sprawiło, że usłyszał o nim (Jezusie z Nazaretu) cały świat?
    - Myślisz, że jesteś symboliczną solą lub światłem?
    - Czy na pewno Twoje życie ma smak? W jaki sposób możesz sprawić, aby Twoja codzienność „nabrała smaku”?
    - Czy harcerstwo jest raczej Twoim hobby, czy integralną częścią Twojego życia?
    comment: Korzec - naczynie do przechowywania zboża.

siglum: Mt 5, 17-19
text: |-
  Jezus powiedział do swoich uczniów:

  «Nie sądźcie, że przyszedłem znieść Prawo albo Proroków. Nie przyszedłem znieść, ale wypełnić. Zaprawdę bowiem, powiadam wam: Dopóki niebo i ziemia nie przeminą, ani jedna jota, ani jedna kreska nie zmieni się w Prawie, aż się wszystko spełni.

  Ktokolwiek więc zniósłby jedno z tych przykazań, choćby najmniejszych, i uczyłby tak ludzi, ten będzie najmniejszy w królestwie niebieskim. A kto je wypełnia i uczy wypełniać, ten będzie wielki w królestwie niebieskim».
variants:
  ogolne:
    title: Jezus a Prawo
    questions:
    - Czy wiara zwalnia z przestrzegania zasad? Dlaczego?
    - Czy umiesz przestrzegać wspólnie ustalonych zasad nawet, jeśli Ci się nie podobają?
    - Którego z przykazań dekalogu najciężej jest Ci przestrzegać? Jak sobie z nim radzisz?
    - Czy masz przyjaciół, którzy mówią Ci krytyczne uwagi? Czy umiesz o nie prosić i je doceniać?

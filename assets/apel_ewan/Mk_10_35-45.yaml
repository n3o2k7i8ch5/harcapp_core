siglum: Mk 10, 35-45
text: |-
  Jakub i Jan, synowie Zebedeusza, podeszli do Jezusa i rzekli: «Nauczycielu, pragniemy, żebyś nam uczynił to, o co Cię poprosimy.»

  On ich zapytał: «Co chcecie, żebym wam uczynił?»

  Rzekli Mu: «Daj nam, żebyśmy w Twojej chwale siedzieli jeden po prawej, a drugi po lewej Twej stronie.»

  Jezus im odparł: «Nie wiecie, o co prosicie. Czy możecie pić kielich, który Ja mam pić, albo przyjąć chrzest, którym Ja mam być ochrzczony?»

  Odpowiedzieli Mu: «Możemy».

  Lecz Jezus rzekł do nich: «Kielich, który Ja mam pić, wprawdzie pić będziecie; i chrzest, który Ja mam przyjąć, wy również przyjmiecie. Nie do Mnie jednak należy dać miejsce po mojej stronie prawej lub lewej, ale dostanie się ono tym, dla których zostało przygotowane».

  Gdy usłyszało to dziesięciu pozostałych, poczęli oburzać się na Jakuba i Jana. A Jezus przywołał ich do siebie i rzekł do nich:

  «Wiecie, że ci, którzy uchodzą za władców narodów, uciskają je, a ich wielcy dają im odczuć swą władzę. Nie tak będzie między wami. Lecz kto by między wami chciał się stać wielkim, niech będzie sługą waszym. A kto by chciał być pierwszym między wami, niech będzie niewolnikiem wszystkich. Bo i Syn Człowieczy nie przyszedł, aby mu służono, lecz żeby służyć i dać swoje życie jako okup za wielu.»
variants:
  ogolne:
    title: Przełożeństwo służbą
    questions:
    - Jak myślisz, dlaczego Jakub i Jan chcieli siedzieć u boku Jezusa?
    - Jakub i Jan traktowali Jezusa po ludzku i nie rozumieli jego odpowiedzi. Czy umiesz być chrześcijaninem nawet, gdy jeszcze nie rozumiesz słów Ewangelii?
    - Czy zawsze jesteś człowiekiem służby w szkole i w domu?
    - Jak możesz rozwijać swojego ducha służby?

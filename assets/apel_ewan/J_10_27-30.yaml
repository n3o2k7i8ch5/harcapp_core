siglum: J 10, 27-30
text: |-
  Jezus powiedział:

  «Moje owce słuchają mego głosu, a Ja znam je. Idą one za Mną, a Ja daję im życie wieczne. Nie zginą na wieki i nikt nie wyrwie ich z mojej ręki. Ojciec mój, który Mi je dał, jest większy od wszystkich. I nikt nie może ich wyrwać z ręki mego Ojca. Ja i Ojciec jedno jesteśmy».
variants:
  ogolne:
    title: Ja i ojciec jedno jesteśmy
    questions:
    - Co to znaczy "słuchać głosu Boga"? Czy Bóg często przemawia ludzkim głosem w języku polskim? Jeżeli przemawia inaczej - jak?
    - Czy słuchasz głosu Boga?
    - Skoro Bóg Cię zna - prawdopodobnie lepiej niż Ty siebie samego - to czy jest coś, co chciałbyś w związku z tym zmienić?
    - Wiara to relacja, a modlitwa to jej doświadczanie. Czy i jak się modlisz? A jak chciałbyś się modlić?

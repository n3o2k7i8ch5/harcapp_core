siglum: Ef 6, 1-4
folders:
- dekalog
text: |-
  Dzieci, bądźcie posłuszne w Panu waszym rodzicom, bo to jest sprawiedliwe. Czcij ojca twego i matkę - jest to pierwsze przykazanie z obietnicą - aby ci było dobrze i abyś był długowieczny na ziemi. A [wy], ojcowie, nie pobudzajcie do gniewu waszych dzieci, lecz wychowujcie je stosując karcenie i napominanie Pańskie!
variants:
  dekalog:
    title: Czcij ojca swego i matkę swoją
    shortTitle: |-
      IV
      Przykazanie
    questions:
    - W jaki sposób możesz "czcić" swoich rodziców?
    - Co to znaczy "jest to przykazanie z obietnicą"? O jakiej obietnicy mowa?
    - 'Z czego wynika posłuszeństwo rodzicom? '
    - Czy dostrzegasz troskę swoich rodziców? Jeśli tak, jak ona wygląda?
    - Czy pomagasz swoim rodzicom, kiedy tego potrzebują? W jaki sposób możesz to robić?
    comment: Pomódlcie się wspólnie za swoich rodziców i rodziny.

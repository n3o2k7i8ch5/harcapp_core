siglum: Mk 13, 24-32
text: |-
  Jezus powiedział do swoich uczniów:

  «W owe dni, po wielkim ucisku, „słońce się zaćmi i księżyc nie da swego blasku. Gwiazdy będą spadać z nieba i moce na niebie” zostaną wstrząśnięte.

  Wówczas ujrzą Syna Człowieczego, przychodzącego w obłokach z wielką mocą i chwałą. Wtedy pośle On aniołów i „zgromadzi swoich wybranych z czterech stron świata, od krańca ziemi po kraniec nieba”.
  A od figowca uczcie się przez podobieństwo. Kiedy już jego gałąź nabrzmiewa sokami i wypuszcza liście, poznajecie, że blisko jest lato. Tak i wy, gdy ujrzycie te wydarzenia, wiedzcie, że to blisko jest, u drzwi.

  Zaprawdę, powiadam wam: Nie przeminie to pokolenie, aż się to wszystko stanie. Niebo i ziemia przeminą, ale słowa moje nie przeminą. Lecz o dniu owym lub godzinie nikt nie wie, ani aniołowie w niebie, ani Syn, tylko Ojciec».
variants:
  ogolne:
    title: Przyjście Chrystusa
    questions:
    - Czy żyjesz codziennie tak, jakby ten dzień mógł być ostatnim? Jak się to objawia?
    - Gdyby świat miał się skończyć dziś - czego byś żałował?
    - Czy Twoja relacja z Bogiem byłaby inna, gdyby świat miał się dziś skończyć? Co byś zmienił?
    - Jak możesz zmieniać swój mały, wielki świat na lepsze?
    comment: |-
      Żadne życie nie jest wieczne, a co za tym idzie, ma określony cel i sens. Najlepiej, gdyby był jasny, jedyny, określony w kontekście tego, co nastąpi po nim - w kontekście życia wiecznego.

      Co jest według Ciebie najważniejsze? Ile czasu spędzasz na głupotach? Czy umiesz wstawać każdego dnia z nadzieją, że dziś uda Ci się zmienić coś na lepsze? Czy umiesz żyć zarazem jako osoba silna i osoba służby zarówno w domu, w harcerswtie, jak i w szkole, albo pracy?

      Możesz zmieniać siebie, być przykładem dla innych, uczyć się niełatwej sztuki poznawania Boga, aby w momencie końca świata Bóg mógł Cię przyjąć jak starego kumpla, przyjaciela i syna. Zmiana ta rozgrywa się każdego dnia :)

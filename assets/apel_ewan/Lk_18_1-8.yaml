siglum: Łk 18, 1-8
text: |-
  Jezus opowiedział swoim uczniom przypowieść o tym, że zawsze powinni się modlić i nie ustawać: «W pewnym mieście żył sędzia, który Boga się nie bał i nie liczył się z ludźmi.

  W tym samym mieście żyła wdowa, która przychodziła do niego z prośbą: „Obroń mnie przed moim przeciwnikiem!” Przez pewien czas nie chciał; lecz potem rzekł do siebie: „Chociaż Boga się nie boję ani z ludźmi się nie liczę, to jednak, ponieważ naprzykrza mi się ta wdowa, wezmę ją w obronę, żeby nie nachodziła mnie bez końca i nie zadręczała mnie”».

  I Pan dodał: «Słuchajcie, co mówi ten niesprawiedliwy sędzia. A Bóg, czyż nie weźmie w obronę swoich wybranych, którzy dniem i nocą wołają do Niego, i czy będzie zwlekał w ich sprawie? Powiadam wam, że prędko weźmie ich w obronę. Czy jednak Syn Człowieczy znajdzie wiarę na ziemi, gdy przyjdzie?»
variants:
  ogolne:
    title: Miłość Boga
    questions:
    - Co chciał osiągnąć sędzia pomagając kobiecie?
    - Dlaczego Bogu chce się Tobie pomagać?
    - 'Co Pan Jezus chciał przekazać uczniom? Dlaczego porównał bezdusznego sędzię z kochającym Bogiem? '
    - Jak często odpowiadasz na czyjeś prośby tylko po to żeby mieć spokój?
    - W jaki sposób Jezus może "znaleźć wiarę, gdy przyjdzie"?

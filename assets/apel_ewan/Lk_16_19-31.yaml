siglum: Łk 16, 19-31
text: |-
  Jezus powiedział do faryzeuszów:

  «Żył pewien człowiek bogaty, który ubierał się w purpurę i bisior i dzień w dzień ucztował wystawnie. U bramy jego pałacu leżał żebrak pokryty wrzodami, imieniem Łazarz. Pragnął on nasycić się odpadkami ze stołu bogacza. A także psy przychodziły i lizały jego wrzody.

  Umarł żebrak i aniołowie zanieśli go na łono Abrahama. Umarł także bogacz i został pogrzebany. Gdy cierpiąc męki w Otchłani, podniósł oczy, ujrzał z daleka Abrahama i Łazarza na jego łonie. I zawołał: „Ojcze Abrahamie, ulituj się nade mną i przyślij Łazarza, aby koniec swego palca umoczył w wodzie i ochłodził mój język, bo strasznie cierpię w tym płomieniu”. Lecz Abraham odrzekł: „Wspomnij, synu, że za życia otrzymałeś swoje dobra, a Łazarz w podobny sposób – niedolę; teraz on tu doznaje pociechy, a ty męki cierpisz. A ponadto między nami a wami zionie ogromna przepaść, tak że nikt, choćby chciał, stąd do was przejść nie może ani stamtąd nie przedostają się do nas”.

  Tamten rzekł: „Proszę cię więc, ojcze, poślij go do domu mojego ojca. Mam bowiem pięciu braci: niech ich ostrzeże, żeby i oni nie przyszli na to miejsce męki”.

  Lecz Abraham odparł: „Mają Mojżesza i Proroków, niechże ich słuchają!” „Nie, ojcze Abrahamie – odrzekł tamten – lecz gdyby ktoś z umarłych poszedł do nich, to się nawrócą”. Odpowiedział mu: „Jeśli Mojżesza i Proroków nie słuchają, to choćby ktoś z umarłych powstał, nie uwierzą”».
variants:
  ogolne:
    title: Żebrak i bogacz
    questions:
    - Jak wyobrażasz sobie niebo?
    - Dlaczego bogacz trafił do Otchłani? Co było jego winą? (Czy samo posiadanie majątku było jego grzechem?)
    - Jak powinien zachować się bogacz?
    - Zwróć uwagę na ostatnią część Ewangelii. Jak myślisz, czy gdyby do braci bogacza przyszedł ktoś z umarłych, nawróciliby się?
    - Czego potrzebujesz, aby uwierzyć w Chrystusa? Czy konieczne są do tego nadzwyczajne zjawiska?
    comment: |-
      O co chodzi z tą purpurą i bisiorem?

      Greckie porphyra to rodzaj ślimaków, z których wytwarzano purpurowy barwnik, bardzo szlachetny i niezwykle kosztowny.

      Na starożytnym Wschodzie purpura była oznaką władzy. Tak było też w Izraelu, gdzie purpura była znakiem władzy królewskiej.

      Zestawienie purpury i bisioru było synonimem bogactwa i władzy. O ile purpura charakteryzowała kolor szat, o tyle bisior był rodzajem tkaniny, nieulegającej farbowaniu, uznawanej za jedną z najdroższych. Wykonywano ją ręcznie z nici stanowiących wydzielinę pewnego gatunku morskich małż, za pomocą której przytwierdzają się one do podłoża.

      Bisior, zwany też jedwabiem morskim, miał piękny, złocisty połysk.

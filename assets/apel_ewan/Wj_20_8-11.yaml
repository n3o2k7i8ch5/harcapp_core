siglum: Wj 20, 8-11
folders:
- dekalog
text: |-
  Pamiętaj o dniu szabatu, aby go uświęcić. Sześć dni będziesz pracować i wykonywać wszystkie twe zajęcia. Dzień zaś siódmy jest szabatem ku czci Pana, Boga twego. Nie możesz przeto w dniu tym wykonywać żadnej pracy ani ty sam, ani syn twój, ani twoja córka, ani twój niewolnik, ani twoja niewolnica, ani twoje bydło, ani cudzoziemiec, który mieszka pośród twych bram. W sześciu dniach bowiem uczynił Pan niebo, ziemię, morze oraz wszystko, co jest w nich, w siódmym zaś dniu odpoczął. Dlatego pobłogosławił Pan dzień szabatu i uznał go za święty.
variants:
  dekalog:
    title: Pamiętaj, abyś dzień święty święcił
    shortTitle: |-
      III
      Przykazanie
    questions:
    - 'Czym jest szabat? '
    - Dlaczego Żydzi nie powinni pracować w szabat?
    - 'Czym róznią się żydowski szabat i katolicka niedziela? '
    - Czy niedziela to “dzień leniucha”?
    - Dlaczego warto być w niedzielę na Eucharystii? Przecież co tydzień dzieje się tam to samo.
    comment: |-
      Zastanówcie się, jak dobrze przeżyć niedzielę podczas obozu? Podzielcie się tym, co Wam pomaga w pełni doświadczyć tego dnia. Możecie np. przygotować kwiaty lub dekorację na ołtarz.

      Czy święcenie dnia świętego sprowadza się tylko do pójścia do kościoła?

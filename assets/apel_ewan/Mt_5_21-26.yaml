siglum: Mt 5, 21-26
folders:
- dekalog
text: |-
  Słyszeliście, że powiedziano przodkom: Nie zabijaj! A kto by się dopuścił zabójstwa, podlega sądowi.

  A Ja wam powiadam: Każdy, kto się gniewa na swego brata, podlega sądowi. A kto by rzekł swemu bratu: Raka, podlega Wysokiej Radzie. A kto by mu rzekł: "Bezbożniku", podlega karze piekła ognistego.

  Jeśli więc przyniesiesz dar swój przed ołtarz i tam wspomnisz, że brat twój ma coś przeciw tobie, zostaw tam dar swój przez ołtarzem, a najpierw idź i pojednaj się z bratem swoim! Potem przyjdź i dar swój ofiaruj!

  Pogódź się ze swoim przeciwnikiem szybko, dopóki jesteś z nim w drodze, by cię przeciwnik nie podał sędziemu, a sędzia dozorcy, i aby nie wtrącono cię do więzienia.

  Zaprawdę, powiadam ci: nie wyjdziesz stamtąd, aż zwrócisz ostatni grosz.
variants:
  dekalog:
    title: Nie zabijaj
    shortTitle: |-
      V
      Przykazanie
    questions:
    - Czy tylko odebranie komuś życia jest złamaniem 5. przykazania? Jakie zachowania również będą występowaniem przeciwko temu przykazaniu?
    - 'Jezus powiedział: “najpierw idź i pojednaj się z bratem swoim!”. Jaka jest Twoja pierwsza reakcja w sytuacjach konfliktowych?'
    - Gdy z kimś się posprzeczasz (tudzież poprztykasz albo pospinasz), to czy dążysz do wyjaśnienia sprawy, czy unikasz kontaktu?
    - Czym może skutkować nierozwiązany konflikt?
    - W jaki sposób można rozwiązać konflikty w zastępie?
    comment: |-
      Ustalcie wspólny sposób rozwiązywania nieporozumień wewnątrz zastępu.
      Np. wspólnie omówienie sytuacji po obiedzie, gdy coś jest nie gra
      Np. pójście spać dopiero, kiedy wszystko sobie wyjaśnicie i znajdziecie rozwiązanie.

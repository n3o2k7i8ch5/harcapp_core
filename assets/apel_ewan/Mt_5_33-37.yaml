siglum: Mt 5, 33-37
folders:
- dekalog
text: |-
  Słyszeliście również, że powiedziano przodkom: Nie będziesz fałszywie przysięgał, lecz dotrzymasz Panu swej przysięgi.

  A Ja wam powiadam: Wcale nie przysięgajcie, ani na niebo, bo jest tronem Bożym; ani na ziemię, bo jest podnóżkiem stóp Jego; ani na Jerozolimę, bo jest miastem wielkiego Króla.

  Ani na swoją głowę nie przysięgaj, bo nie możesz nawet jednego włosa uczynić białym albo czarnym.

  Niech wasza mowa będzie: Tak, tak; nie, nie. A co nadto jest, od Złego pochodzi.
variants:
  dekalog:
    title: Nie mów fałszywego świadectwa przeciw bliźniemu swemu
    shortTitle: |-
      VIII
      Przykazanie
    questions:
    - Czym jest "fałszywe świadectwo przeciw bliźniemu"?
    - Dlaczego Jezus sugeruje, by nie przysięgać na cokolwiek?
    - 'W jaki sposób możesz spełnić enigmatyczne słowa: "dotrzymać Panu swej przysięgi"?'
    - Co oznaczają słowa Skautów Europy "na nasz honor i z łaską Bożą"?
    - Czym jest przyrzeczenie harcerskie? Formułką do nauczenia na pamięć, czy prawdą, jaką każdy harcerz powinien żyć?
    comment: Przeanalizujcie rotę przyrzeczenia, wyjaśnijcie znaczenie każdego wersu. Zastanówcie się, jak długo obowiązuje i kiedy nas dotyczy (czy tylko, kiedy nosimy mundur)?

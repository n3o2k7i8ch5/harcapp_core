siglum: Mk 12, 38-44
text: |-
  Jezus, nauczając rzesze, mówił:

  «Strzeżcie się uczonych w Piśmie. Z upodobaniem chodzą oni w powłóczystych szatach, lubią pozdrowienia na rynku, pierwsze krzesła w synagogach i zaszczytne miejsca na ucztach. Objadają domy wdów i dla pozoru odprawiają długie modlitwy. Ci tym surowszy dostaną wyrok».

  Potem, usiadłszy naprzeciw skarbony, przypatrywał się, jak tłum wrzucał drobne pieniądze do skarbony. Wielu bogatych wrzucało wiele. Przyszła też jedna uboga wdowa i wrzuciła dwa pieniążki, czyli jeden grosz.

  Wtedy przywołał swoich uczniów i rzekł do nich: «Zaprawdę, powiadam wam: Ta uboga wdowa wrzuciła najwięcej ze wszystkich, którzy kładli do skarbony. Wszyscy bowiem wrzucali z tego, co im zbywało; ona zaś ze swego niedostatku wrzuciła wszystko, co miała na swe utrzymanie».
variants:
  ogolne:
    title: Wdowi grosz
    questions:
    - Czy umiesz dawać innym z tego, co jest dla Ciebie ważne, czy tylko z tego, czego Ci zbywa?
    - Jak to możliwe, że ktoś decyduje się oddać wszystko, co ma?
    - Czy jest coś, na co chciałbyś umieć przeznaczyć wszystko, co masz?
    - W czym chciałbyś od siebie więcej wymagać? Jak możesz tego dokonać?
    - Po co w ogóle od siebie wymagać?

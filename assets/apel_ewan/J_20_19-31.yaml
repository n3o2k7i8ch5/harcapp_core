siglum: J 20, 19-31
text: |-
  Wieczorem w dniu zmartwychwstania, tam gdzie przebywali uczniowie, choć drzwi były zamknięte z obawy przed Żydami, przyszedł Jezus, stanął pośrodku i rzekł do nich: «Pokój wam!» A to powiedziawszy, pokazał im ręce i bok.

  Uradowali się zatem uczniowie, ujrzawszy Pana. A Jezus znowu rzekł do nich: «Pokój wam! Jak Ojciec Mnie posłał, tak i Ja was posyłam». Po tych słowach tchnął na nich i powiedział im: «Weźmijcie Ducha Świętego! Którym odpuścicie grzechy, są im odpuszczone, a którym zatrzymacie, są im zatrzymane».

  Ale Tomasz, jeden z Dwunastu, zwany Didymos, nie był razem z nimi, kiedy przyszedł Jezus. Inni więc uczniowie mówili do niego: «Widzieliśmy Pana!» Ale on rzekł do nich: «Jeżeli na rękach Jego nie zobaczę śladu gwoździ i nie włożę palca mego w miejsce gwoździ, i ręki mojej nie włożę w bok Jego, nie uwierzę».

  A po ośmiu dniach, kiedy uczniowie Jego byli znowu wewnątrz domu i Tomasz z nimi, Jezus przyszedł, choć drzwi były zamknięte, stanął pośrodku i rzekł: «Pokój wam!» Następnie rzekł do Tomasza: «Podnieś tutaj swój palec i zobacz moje ręce. Podnieś rękę i włóż w mój bok, i nie bądź niedowiarkiem, lecz wierzącym».

  Tomasz w odpowiedzi rzekł do Niego: «Pan mój i Bóg mój!»

  Powiedział mu Jezus: «Uwierzyłeś dlatego, że Mnie ujrzałeś? Błogosławieni, którzy nie widzieli, a uwierzyli».

  I wiele innych znaków, których nie zapisano w tej księdze, uczynił Jezus wobec uczniów. Te zaś zapisano, abyście wierzyli, że Jezus jest Mesjaszem, Synem Bożym, i abyście wierząc, mieli życie w imię Jego.
variants:
  ogolne:
    title: Zmartwychwstały ukazuje się Apostołom
    questions:
    - Jak byś Ty się czuł na miejscu uczniów po śmierci swojego mistrza?
    - Czy zdarza Ci się być niewiernym Tomaszem?
    - Wiara każdego człowieka powinna dojrzewać i dorastać - a przez to się zmieniać. Co możesz zrobić w momencie pojawienia się na tej drodze kryzysu wiary?
    - Jak możesz przyprowadzić innych do Boga?
    comment: |-
      Dzień zmartwychwstania. Trzeci dzień upływa odkąd Jezus został zabity na krzyżu. Uczniowie pokładali w nim całą ufność i nadzieję, zostawili dla niego domy i dobytki, wierzyli, że ów Nazarejczyk jest Mesjaszem, królem, na którego Izrael czekał od stuleci. Zostali jego apostołami i wbrew wielu ludziom głosili jego naukę. Narazili się przez to niemałej liczbie ludzi: Żydom, faryzeuszom, uczonym - znakomitej części społeczeństwa.

      Teraz zaś, po śmierci Jezusa zostali sami, bez autorytetu swojego mistrza.

      Może pierwszego dnia byli jeszcze w szoku? Może drugiego wierzyli, że wszystko da się jakoś wytłumaczyć? Ale trzeciego dnia? Czy tak się miała skończyć ich historia? Jak mogliby się teraz nie czuć zwiedzeni, oszukani, wykorzystani, może nawet zdradzeni? Na domiar wszystkiego jak mają teraz wyjść do świata bez obawy, że i oni zostaną skazani?

      Do tych właśnie apospołów, pełnych goryczy, zmarnowanych, przestraszonych przychodzi ich mistrz, i stary przyjaciel - Jezus.

      Apospołowie byli ludźmi takimi jak Ty. Spróbuj wczuć się w to, co musieli przeżyć, gdy zobaczyli swojego starego przyjaciela, Chrystusa, w drzwiach.

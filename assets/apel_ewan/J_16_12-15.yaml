siglum: J 16, 12-15
text: |-
  Jezus powiedział do swoich uczniów:

  «Jeszcze wiele mam wam do powiedzenia, ale teraz znieść nie możecie. Gdy zaś przyjdzie On, Duch Prawdy, doprowadzi was do całej prawdy. Bo nie będzie mówił od siebie, ale powie wszystko, cokolwiek usłyszy, i oznajmi wam rzeczy przyszłe. On Mnie otoczy chwałą, ponieważ z mojego weźmie i wam objawi.

  Wszystko, co ma Ojciec, jest moje. Dlatego powiedziałem, że z mojego weźmie i wam objawi».
variants:
  ogolne:
    title: Sąd Ducha Świętego
    questions:
    - Czy jesteś otwarty usłyszenie prawdy, w tym prawdy o sobie, od Boga i od innych ludzi?
    - Czy starasz się myśleć o swoim zastępie i drużynie jako o wspólnocie, która wymaga od wszystkich jej członków wspierania siebie nawzajem?
    - Czy starasz się pomagać swoim bliskim w ich codziennych obowiązkach?
    - Są w życiu człowieka prawdy, których nie można pojąć rozumiem. Jak do nich podchodzisz?
    comment: |-
      Według wielu teologów są trzy prawdy wiary, do których człowiek nie mógłby dojść naturalnym rozumem:
      - o Wcieleniu,
      - o Trójcy Świętej
      - o cudzie Eucharystii.

      Jezus Chrystus mówi: „On Mnie otoczy chwałą, ponieważ z mojego weźmie i wam oznajmi. Wszystko, co ma Ojciec, jest moje”. Trójca Święta: Ojciec, Syn i Duch, nie są jakąś chaotyczną zbieraniną osób, lecz doskonałą wspólnotą. Teologia określa czasami Trójcę Świętą słowem „perychoreza”, a więc taniec.

siglum: Wj 3, 13-15
folders:
- dekalog
text: |-
  Mojżesz zaś rzekł Bogu: «Oto pójdę do Izraelitów i powiem im: Bóg ojców naszych posłał mię do was. Lecz gdy oni mnie zapytają, jakie jest Jego imię, to cóż im mam powiedzieć?»
  Odpowiedział Bóg Mojżeszowi: «<i>Jestem</i>, który <i>Jestem</i>».
  I dodał: «Tak powiesz synom Izraela: <i>Jestem</i> posłał mnie do was».
  Mówił dalej Bóg do Mojżesza: «Tak powiesz Izraelitom: "<i>Jestem</i>, Bóg ojców waszych, Bóg Abrahama, Bóg Izaaka i Bóg Jakuba posłał mnie do was. To jest imię moje na wieki i to jest moje zawołanie na najdalsze pokolenia.
variants:
  dekalog:
    title: Nie będziesz wzywał imienia Boga twego nadaremno
    shortTitle: |-
      II
      Przykazanie
    questions:
    - Dlaczego Mojżesz chciał poznać imię Boga? Dlaczego było to takie ważne?
    - Co oznacza poznanie kogoś?
    - Po co Bóg objawił swoje imię? Dlaczego ludzie powinni szanować imię Boga?
    - Jak traktujesz imię Boga, kiedy go używasz? Czy zawsze robisz to w odpowiednich sytuacjach?
    comment: |-
      W kulturze żydowskiej imię miało niezwykłe znaczenie, ponieważ wyrażało cechy, tożsamość, bądź cele danego człowieka.

      Piotr - opoka, skała, na której Jezus zbudował kościół.
      Abraham - kochaj ojca.
      Sara - księżniczka.

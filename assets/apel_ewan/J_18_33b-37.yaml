siglum: J 18, 33b-37
text: |-
  Piłat powiedział do Jezusa: «Czy Ty jesteś Królem żydowskim?»

  Jezus odpowiedział: «Czy to mówisz od siebie, czy też inni powiedzieli ci o Mnie?»

  Piłat odparł: «Czy ja jestem Żydem? Naród Twój i arcykapłani wydali mi Ciebie. Co uczyniłeś?»

  Odpowiedział Jezus: «Królestwo moje nie jest z tego świata. Gdyby królestwo moje było z tego świata, słudzy moi biliby się, abym nie został wydany Żydom. Teraz zaś królestwo moje nie jest stąd».

  Piłat zatem powiedział do Niego: «A więc jesteś królem?»

  Odpowiedział Jezus: «Tak, jestem królem. Ja się na to narodziłem i na to przyszedłem na świat, aby dać świadectwo prawdzie. Każdy, kto jest z prawdy, słucha mojego głosu».
variants:
  ogolne:
    title: Jezus przed Piłatem
    questions:
    - Skoro (ewidentnie) Jezus nie jest królem politycznym, to jakim królem jest Jezus?
    - O czym mówi Jezus mówiąc "każdy kto jest z prawdy, słucha mojego głosu"?
    - Dlaczego Żydzi i arcykapłani wydali Jezusa na śmierć?
    - Jak myślisz, jakie jest "królestwo niebieskie", o którym mówi Jezus?
    - Czy Jezus jest Twoim królem? Co to dokładnie oznacza?
    comment: |-
      O prawdzie:

      Arystoteles definiował ją w następujący sposób:
      „Powiedzieć, że istnieje, o czymś, czego nie ma, jest fałszem. Powiedzieć o tym, co jest, że jest, a o tym, czego nie ma, że go nie ma, jest prawdą.”

      Zaś nasz rodak Jan Paweł II zwykł mawiać:
      „Poznajcie prawdę, a prawda was wyzwoli”.

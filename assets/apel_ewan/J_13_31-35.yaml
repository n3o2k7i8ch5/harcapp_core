siglum: J 13, 31-35
text: |-
  Po wyjściu Judasza z wieczernika Jezus powiedział: «Syn Człowieczy został teraz otoczony chwałą, a w Nim Bóg został chwałą otoczony. Jeżeli Bóg został w Nim otoczony chwałą, to i Bóg Go otoczy chwałą w sobie samym, i to zaraz Go chwałą otoczy.

  Dzieci, jeszcze krótko jestem z wami. Przykazanie nowe daję wam, abyście się wzajemnie miłowali, tak jak Ja was umiłowałem; żebyście i wy tak się miłowali wzajemnie. Po tym wszyscy poznają, że jesteście uczniami moimi, jeśli będziecie się wzajemnie miłowali».
variants:
  ogolne:
    title: Miłujcie się wzajemnie
    questions:
    - Jak objawia się miłość do bliźniego, którego się lubi, a jak do bliźniego, którego się nie lubi?
    - Czy potrafisz bezinteresownie kochać wszystkich swoich bliźnich?
    - Czy starasz się pomagać swoim znajomym w stawaniu się lepszymi ludźmi, którzy nie boją się kroczyć drogą Ewangelii?
    - Jak wygląda miłość Boga do człowieka, o której mówi Jezus? Co z niej wynika?

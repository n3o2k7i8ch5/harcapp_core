siglum: Łk 18, 35-43
text: |-
  Kiedy Jezus przybliżał się do Jerycha, jakiś niewidomy siedział przy drodze i żebrał. Gdy usłyszał przeciągający tłum, wypytywał się, co to się dzieje. Powiedzieli mu, że Jezus z Nazaretu przechodzi. Wtedy zaczął wołać: „Jezusie, Synu Dawida, ulituj się nade mną!”

  Ci, co szli na przedzie, nastawali na niego, żeby umilkł. Lecz on jeszcze głośniej wołał: „Jezusie, Synu Dawida, ulituj się nade mną!”

  Jezus przystanął i kazał przyprowadzić go do siebie. A gdy się przybliżył, zapytał go: „Co chcesz, abym ci uczynił?”

  On odpowiedział: „Panie, żebym przejrzał”.

  Jezus mu odrzekł: „Przejrzyj, twoja wiara cię uzdrowiła”.

  Natychmiast przejrzał i szedł za Nim, wielbiąc Boga. Także cały lud, który to widział, oddał chwałę Bogu.
variants:
  ogolne:
    title: Niewidomy pod Jerychem
    questions:
    - Czy potrafisz, pomimo różnych przeszkód, wytrwale wołać do Jezusa o pomoc?
    - Czy jesteś wdzięczny Bogu za wszystko, co od niego otrzymałeś (również za swoje wady)?
    - Czy często się modlisz? Czy umiesz szukać form motliwy, dzięki którym najlepiej jest Ci być z Bogiem?

siglum: Łk 17, 11-19
text: |-
  Zdarzyło się, że Jezus, zmierzając do Jeruzalem, przechodził przez pogranicze Samarii i Galilei.

  Gdy wchodzili do pewnej wsi, wyszło naprzeciw Niego dziesięciu trędowatych. Zatrzymali się z daleka i głośno zawołali: «Jezusie, Mistrzu, ulituj się nad nami!» Na ten widok rzekł do nich: Idźcie, pokażcie się kapłanom!» A gdy szli, zostali oczyszczeni.

  Wtedy jeden z nich, widząc, że jest uzdrowiony, wrócił, chwaląc Boga donośnym głosem, padł na twarz u Jego nóg i dziękował Mu. A był to Samarytanin.

  Jezus zaś rzekł: «Czyż nie dziesięciu zostało oczyszczonych? Gdzie jest dziewięciu? Czy się nie znalazł nikt, kto by wrócił i oddał chwałę Bogu, tylko ten cudzoziemiec?» Do niego zaś rzekł: «Wstań, idź, twoja wiara cię uzdrowiła».
variants:
  ogolne:
    title: Prośby
    questions:
    - Po co jeden z uzdrowionych wrócił do Jezusa?
    - Dlaczego w Ewangelii podkreślono, że ten, który wrócił był Samarytaninem? Jakie to ma znaczenie?
    - Dlaczego spośród dziesięciu uzdrowionych wrócił tylko jeden?
    - Czy dziękujesz Bogu, gdy spełni się Twoja prośba? Dlaczego?
    - Czy potrafisz dziękować innym, za to co dla Ciebie robią? Dlaczego może sprawiać Ci to trudność?
    comment: Samarytanie i Izraelici byli skłóconymi narodami.

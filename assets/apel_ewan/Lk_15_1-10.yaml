siglum: Łk 15, 1-10
text: |-
  W owym czasie przybliżali się do Jezusa wszyscy celnicy i grzesznicy, aby Go słuchać. Na to szemrali faryzeusze i uczeni w Piśmie, mówiąc: «Ten przyjmuje grzeszników i jada z nimi».

  Opowiedział im wtedy następującą przypowieść:

  «Któż z was, gdy ma sto owiec, a zgubi jedną z nich, nie zostawia dziewięćdziesięciu dziewięciu na pustyni i nie idzie za zgubioną, aż ją znajdzie? A gdy ją znajdzie, bierze z radością na ramiona i wraca do domu; sprasza przyjaciół i sąsiadów i mówi im: „Cieszcie się ze mną, bo znalazłem owcę, która mi zginęła”.

  Powiadam wam: Tak samo w niebie większa będzie radość z jednego grzesznika, który się nawraca, niż z dziewięćdziesięciu dziewięciu sprawiedliwych, którzy nie potrzebują nawrócenia.

  Albo jeśli jakaś kobieta, mając dziesięć drachm, zgubi jedną drachmę, czyż nie zapala światła, nie wymiata domu i nie szuka starannie, aż ją znajdzie? A znalazłszy ją, sprasza przyjaciółki i sąsiadki i mówi: „Cieszcie się ze mną, bo znalazłam drachmę, którą zgubiłam”.

  Tak samo, powiadam wam, radość nastaje wśród aniołów Bożych z powodu jednego grzesznika, który się nawraca».
variants:
  ogolne:
    title: Zagubiona owca
    questions:
    - Kogo miał na myśli Jezus mówiąc o owcach? Kto jest ich pasterzem?
    - Dlaczego pasterz szuka tej jednej owcy skoro ma jeszcze dziewięćdziesiąt dziewięć?
    - Pasterz, gdy znajdzie zaginioną owcę, nie gani jej ani nie poucza, ale wyprawia przyjęcie. Czy Ty także umiesz postępować w ten sposób wobec innych ludzi?

siglum: 2 Tes 3, 10-12
folders:
- dekalog
text: |-
  Albowiem, gdy byliśmy u was, nakazywaliśmy wam tak: Kto nie chce pracować, niech też nie je!

  Słyszymy bowiem, że niektórzy wśród was postępują wbrew porządkowi: wcale nie pracują, lecz zajmują się rzeczami niepotrzebnymi. Tym przeto nakazujemy i napominamy ich w Panu Jezusie Chrystusie, aby pracując ze spokojem, własny chleb jedli.
variants:
  dekalog:
    title: Nie kradnij
    shortTitle: |-
      VII
      Przykazanie
    questions:
    - 'Co można nazwać kradzieżą? '
    - Do czego prowadzi unikanie wysiłku i wykorzystywanie czyjejś pracy? Czym różni się obóz unikania pracy od obozu wspólnych obowiązków?
    - Co da się ukraść, poza rzeczami materialnymi?
    - Przedmioty można łatwo zwrócić i przeprosić. A jak wynagrodzić komuś kradzież rzeczy niematerialnych?
    - Czy pozwalasz np. internetowi kraść sobie czas? Kiedy odpoczynek zamienia się w marnowanie czasu i lenistwo?
